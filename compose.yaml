version: '3.8'

services:
  ipinfo-service:
    container_name: roticeh-ipinfo-core
    build:
      context: .
      dockerfile: Dockerfile
    image: roticeh-ipinfo:latest
    ports:
      - "9755:9755"
    restart: always
    
    environment:
      - IPINFO_SERVER_PORT=:9755
      - IPINFO_SERVER_NAME=IPInfo
      - SECRET_TOKEN=rtch_live_prod_secret_key_change_me_on_server
      - GEO_DB_PATH=./db/GeoLite2-City.mmdb
      - ASN_DB_PATH=./db/GeoLite2-ASN.mmdb
      - APP_ENV=production


    volumes:
      - ./db:/dist/db
      - ./config.yaml:/dist/config.yaml

   
    deploy:
      resources:
        limits:
          cpus: '0.50'     
          memory: 256M     
        reservations:
          memory: 64M   

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9755/ip/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s